name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # حل التنبيه الأصفر اللي في صورتك
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fix Ajv & Install
        run: |
          npm install --legacy-peer-deps
          # هذا السطر يحل مشكلة ajv-keywords اللي ظاهرة في السطر 106 عندك
          npm install ajv@^8.12.0 ajv-keywords@^5.1.0 --save-dev --legacy-peer-deps
      - name: Build Web
        run: |
          export NODE_OPTIONS=--openssl-legacy-provider
          npx expo export:web
      - name: Smart Folder Detection
        id: detect
        run: |
          if [ -d "dist" ]; then
            echo "path=dist" >> $GITHUB_OUTPUT
          elif [ -d "web-build" ]; then
            echo "path=web-build" >> $GITHUB_OUTPUT
          else
            echo "Error: No build folder found" && exit 1
          fi
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.detect.outputs.path }}
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
